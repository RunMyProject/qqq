# application.properties
# Author: Edoardo Sabatini
# Date: 2026-03-29
# 
quarkus.http.port=8081

# Enable CORS to allow the frontend to communicate with the backend
# 
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:5173
quarkus.http.cors.methods=GET,POST,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization

# LangChain4j / LLM mock
quarkus.langchain4j.openai.base-url=http://localhost:8080/v1
quarkus.langchain4j.openai.api-key=sk-no-key-required
quarkus.langchain4j.openai.chat-model.model-name=qwen-2.5-1.5b
quarkus.langchain4j.openai.chat-model.temperature=0.7
